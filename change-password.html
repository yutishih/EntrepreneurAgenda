<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定新密碼｜企業家國際演講會</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei",
                   "PingFang TC", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 40px 36px 36px;
      width: 380px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .card-logo { margin-bottom: 12px; }
    .card-logo img { width: 56px; height: 56px; object-fit: contain; }

    .card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .notice-box {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 20px;
      text-align: left;
      line-height: 1.5;
    }

    .field {
      text-align: left;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: #004165;
    }

    .error-msg {
      font-size: 12px;
      color: #e63946;
      min-height: 20px;
      margin-bottom: 10px;
      text-align: left;
    }

    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #004165;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #003050; }
    .btn-submit:disabled { background: #a9b2b1; cursor: not-allowed; }

    .btn-submit .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <img src="media/toastmasters_logo.png" alt="TM Logo">
  </div>
  <h2>設定新密碼</h2>
  <p class="card-subtitle">企業家國際演講會</p>

  <div class="notice-box" id="noticeBox">
    您的帳號是首次登入，請先設定自己的密碼才能繼續使用系統。
  </div>

  <div class="field">
    <label>目前密碼（由管理員提供）</label>
    <input type="password" id="oldPassword" placeholder="請輸入目前密碼"
           onkeydown="if(event.key==='Enter') document.getElementById('newPassword').focus()">
  </div>
  <div class="field">
    <label>新密碼（至少 6 個字元）</label>
    <input type="password" id="newPassword" placeholder="請輸入新密碼"
           onkeydown="if(event.key==='Enter') document.getElementById('confirmPassword').focus()">
  </div>
  <div class="field">
    <label>確認新密碼</label>
    <input type="password" id="confirmPassword" placeholder="再輸入一次新密碼"
           onkeydown="if(event.key==='Enter') doChange()">
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <button class="btn-submit" id="btnSubmit" onclick="doChange()">確認送出</button>
  <p class="hint" id="skipHint" style="display:none">
    <a href="/home" style="color:#004165">暫時跳過，稍後再設定</a>
  </p>
</div>

<script src="auth.js"></script>
<script>
  async function onLoad() {
    const token = getToken();
    if (!token) { location.href = '/login'; return; }

    // Verify token still valid
    try {
      const res = await fetch(`${API_BASE}/api/auth/verify`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) { clearAuth(); location.href = '/login'; return; }
      const data = await res.json();
      setAuth(token, data.username, data.role, data.club_id, data.must_change_pw);

      // If already changed, go home
      if (!data.must_change_pw) { location.href = '/home'; return; }

      // Show username hint
      document.getElementById('noticeBox').textContent =
        `${data.username}，您的帳號是首次登入，請先設定自己的密碼才能繼續使用系統。`;
    } catch {
      clearAuth();
      location.href = '/login';
    }
  }

  async function doChange() {
    const oldPassword     = document.getElementById('oldPassword').value;
    const newPassword     = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorEl         = document.getElementById('errorMsg');
    const btn             = document.getElementById('btnSubmit');

    errorEl.textContent = '';
    if (!oldPassword) { errorEl.textContent = '請輸入目前密碼'; return; }
    if (!newPassword)  { errorEl.textContent = '請輸入新密碼'; return; }
    if (newPassword.length < 6) { errorEl.textContent = '新密碼至少需要 6 個字元'; return; }
    if (newPassword !== confirmPassword) { errorEl.textContent = '兩次輸入的新密碼不一致'; return; }
    if (newPassword === oldPassword) { errorEl.textContent = '新密碼不能與目前密碼相同'; return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>處理中...';
    try {
      const res = await fetch(`${API_BASE}/api/auth/change-password`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${getToken()}`,
        },
        body: JSON.stringify({ old_password: oldPassword, new_password: newPassword }),
      });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.detail || '密碼變更失敗'; return; }

      // Clear must_change_pw flag in localStorage
      setAuth(getToken(), getUsername(), getRole(), getClubId(), false);
      location.href = '/home';
    } catch {
      errorEl.textContent = '無法連線到伺服器，請確認後端已啟動';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '確認送出';
    }
  }

  document.addEventListener('DOMContentLoaded', onLoad);
</script>
</body>
</html>
