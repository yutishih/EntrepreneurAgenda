<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜企業家國際演講會</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei",
                   "PingFang TC", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 14px;
      padding: 40px 36px 36px;
      width: 360px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .login-logo { margin-bottom: 12px; }
    .login-logo img { width: 64px; height: 64px; object-fit: contain; }

    .login-card h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .login-tabs {
      display: flex;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      margin-bottom: 22px;
    }

    .login-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #fafafa;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      transition: background 0.15s, color 0.15s;
    }

    .login-tab.active {
      background: #004165;
      color: #fff;
      font-weight: 600;
    }

    .login-field {
      text-align: left;
      margin-bottom: 14px;
    }

    .login-field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }

    .login-field input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      outline: none;
      border-color: #004165;
    }

    .login-error {
      font-size: 12px;
      color: #e63946;
      min-height: 20px;
      margin-bottom: 10px;
      text-align: left;
    }

    .btn-login-submit {
      width: 100%;
      padding: 11px;
      background: #772432;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login-submit:hover { background: #5a1a25; }
    .btn-login-submit:disabled { background: #a9b2b1; cursor: not-allowed; }

    .btn-login-submit .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <img src="media/toastmasters_logo.png" alt="TM Logo">
  </div>
  <h2>企業家國際演講會</h2>
  <p class="login-subtitle">Club Management</p>

  <div class="login-tabs">
    <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">登入</button>
    <button class="login-tab" id="tabRegister" onclick="switchTab('register')">註冊</button>
  </div>

  <div id="loginForm">
    <div class="login-field">
      <label>帳號</label>
      <input type="text" id="loginUsername" placeholder="請輸入帳號"
             onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="loginPassword" placeholder="請輸入密碼"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div id="loginError" class="login-error"></div>
    <button class="btn-login-submit" id="btnLogin" onclick="doLogin()">登入</button>
  </div>

  <div id="registerForm" style="display:none">
    <div id="registerFields">
      <div class="login-field">
        <label>帳號（至少 3 字元）</label>
        <input type="text" id="registerUsername" placeholder="請輸入帳號"
               onkeydown="if(event.key==='Enter') document.getElementById('registerNameEn').focus()">
      </div>
      <div class="login-field">
        <label>英文姓名 English Name</label>
        <input type="text" id="registerNameEn" placeholder="e.g. John Smith"
               onkeydown="if(event.key==='Enter') document.getElementById('registerNameZh').focus()">
      </div>
      <div class="login-field">
        <label>中文姓名</label>
        <input type="text" id="registerNameZh" placeholder="e.g. 王小明"
               onkeydown="if(event.key==='Enter') document.getElementById('registerPassword').focus()">
      </div>
      <div class="login-field">
        <label>所屬分會</label>
        <select id="registerClub" style="width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;">
          <option value="">— 請選擇分會 —</option>
        </select>
      </div>
      <div class="login-field">
        <label>密碼（至少 6 字元）</label>
        <input type="password" id="registerPassword" placeholder="請輸入密碼"
               onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <div id="registerError" class="login-error"></div>
      <button class="btn-login-submit" id="btnRegister" onclick="doRegister()">提交申請</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  async function onLoad() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${API_BASE}/api/auth/verify`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) window.location.href = '/home';
      else clearAuth();
    } catch {
      clearAuth();
    }
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
    document.getElementById('tabLogin').classList.toggle('active',    isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('loginError').textContent = '';
    const regErr = document.getElementById('registerError');
    if (regErr) regErr.textContent = '';
    if (!isLogin) loadRegisterClubs();
  }

  let clubsLoaded = false;
  async function loadRegisterClubs() {
    if (clubsLoaded) return;
    try {
      const res = await fetch(`${API_BASE}/api/clubs`);
      if (!res.ok) return;
      const clubs = await res.json();
      const sel = document.getElementById('registerClub');
      clubs.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
      clubsLoaded = true;
    } catch { /* ignore */ }
  }

  async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl  = document.getElementById('loginError');
    const btn      = document.getElementById('btnLogin');
    errorEl.textContent = '';
    if (!username || !password) { errorEl.textContent = '請填寫帳號和密碼'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>處理中...';
    try {
      const res  = await fetch(`${API_BASE}/api/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.detail || '登入失敗'; return; }
      setAuth(data.token, data.username, data.role, data.club_id, data.must_change_pw);
      window.location.href = data.must_change_pw ? '/change-password' : '/home';
    } catch {
      errorEl.textContent = '無法連線到伺服器，請確認後端已啟動';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '登入';
    }
  }

  async function doRegister() {
    const username = document.getElementById('registerUsername').value.trim();
    const name_en  = document.getElementById('registerNameEn').value.trim();
    const name_zh  = document.getElementById('registerNameZh').value.trim();
    const clubVal  = document.getElementById('registerClub').value;
    const password = document.getElementById('registerPassword').value;
    const errorEl  = document.getElementById('registerError');
    const btn      = document.getElementById('btnRegister');
    errorEl.textContent = '';
    if (!username || !password) { errorEl.textContent = '請填寫帳號和密碼'; return; }
    if (!name_en) { errorEl.textContent = '請輸入英文姓名'; return; }
    if (!name_zh) { errorEl.textContent = '請輸入中文姓名'; return; }
    const club_id = clubVal ? parseInt(clubVal) : null;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>處理中...';
    try {
      const res  = await fetch(`${API_BASE}/api/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password, name_en, name_zh, club_id }),
      });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.detail || '註冊失敗'; return; }
      // Show pending approval message
      document.getElementById('registerFields').innerHTML = `
        <div style="text-align:center; padding:16px 0 8px">
          <div style="font-size:36px; margin-bottom:14px">✅</div>
          <div style="font-weight:700; font-size:15px; color:#0f172a; margin-bottom:8px">申請已提交！</div>
          <div style="font-size:12px; color:#64748b; line-height:1.7; margin-bottom:18px">
            帳號 <strong>${username}</strong> 已成功送出，<br>
            請等待分會管理員審核批准後即可登入。
          </div>
          <a href="#" onclick="switchTab('login');return false;"
             style="color:#004165;font-size:13px;font-weight:600;text-decoration:none">
            ← 返回登入
          </a>
        </div>`;
    } catch {
      errorEl.textContent = '無法連線到伺服器，請確認後端已啟動';
      btn.disabled = false;
      btn.innerHTML = '提交申請';
    }
  }

  document.addEventListener('DOMContentLoaded', onLoad);
</script>
</body>
</html>
