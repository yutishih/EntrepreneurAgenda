<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業家國際演講會｜會員管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      min-height: 100vh;
      background: #f4f6f9;
      color: #1a1a2e;
    }

    /* ---- Navbar ---- */
    .navbar {
      background: #1a1a2e;
      color: #fff;
      padding: 0 28px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .navbar-left { display: flex; align-items: center; gap: 16px; }
    .navbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .navbar-title span { color: #e63946; }
    .btn-nav-back {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-nav-back:hover { border-color: #e63946; color: #e63946; }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-user { font-size: 12px; color: #aaa; }
    .btn-nav-logout {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-nav-logout:hover { border-color: #e63946; color: #e63946; }

    /* ---- Main ---- */
    .main { max-width: 860px; margin: 0 auto; padding: 36px 20px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .section-header h2 { font-size: 18px; font-weight: 700; }

    .btn-add-member {
      padding: 9px 20px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add-member:hover { background: #c1121f; }

    /* ---- Search ---- */
    .search-row { margin-bottom: 14px; }
    .search-row input {
      width: 100%;
      padding: 9px 14px;
      border: 1px solid #ddd;
      border-radius: 9px;
      font-size: 13px;
      background: #fff;
    }
    .search-row input:focus { outline: none; border-color: #e63946; }

    /* ---- Member list ---- */
    .member-grid { display: flex; flex-direction: column; gap: 8px; }

    .member-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      border: 1px solid transparent;
      transition: box-shadow 0.15s;
    }
    .member-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.10); }

    .mc-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .mc-body { flex: 1; min-width: 0; }
    .mc-names {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .mc-name-zh { font-size: 14px; font-weight: 700; }
    .mc-name-en { font-size: 13px; color: #555; }
    .mc-level {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #2a9d8f;
      background: #eaf7f5;
      border-radius: 5px;
      padding: 2px 7px;
    }
    .mc-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-edit-m {
      padding: 5px 13px;
      background: #f0f4ff;
      border: 1px solid #c5d0f0;
      border-radius: 6px;
      font-size: 12px;
      color: #4a6cf7;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-edit-m:hover { background: #e0e8ff; }
    .btn-del-m {
      padding: 5px 10px;
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #aaa;
    }
    .btn-del-m:hover { background: #ffe0e0; color: #e63946; }

    .empty-msg {
      text-align: center;
      color: #bbb;
      padding: 40px;
      font-size: 14px;
    }
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e8e8e8;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 28px 24px;
      width: 380px;
      max-width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal-field { margin-bottom: 13px; }
    .modal-field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .modal-field input {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: 13px;
    }
    .modal-field input:focus { outline: none; border-color: #e63946; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .btn-modal-cancel {
      padding: 8px 18px;
      background: #f0f0f0;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    .btn-modal-cancel:hover { background: #e0e0e0; }
    .btn-modal-save {
      padding: 8px 22px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-modal-save:hover { background: #c1121f; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-left">
    <div class="navbar-title"><span>企業家</span>國際演講會</div>
    <a class="btn-nav-back" href="home.html">← 返回</a>
  </div>
  <div class="navbar-right">
    <span id="navUser" class="navbar-user"></span>
    <button class="btn-nav-logout" onclick="doLogout()">登出</button>
  </div>
</nav>

<main class="main">
  <div class="section-header">
    <h2>會員管理</h2>
    <button class="btn-add-member" onclick="openModal()">＋ 新增會員</button>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜尋姓名…" oninput="renderList()">
  </div>

  <div id="memberGrid" class="member-grid">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">新增會員</h3>
    <div class="modal-field">
      <label>中文姓名</label>
      <input type="text" id="fNameZh" placeholder="蔡宜容">
    </div>
    <div class="modal-field">
      <label>英文姓名</label>
      <input type="text" id="fNameEn" placeholder="Lia Tsai">
    </div>
    <div class="modal-field">
      <label>等級</label>
      <input type="text" id="fLevel" placeholder="TM / CC / DTM / IP4 …">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">取消</button>
      <button class="btn-modal-save" onclick="saveMember()">儲存</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  let members = [];
  let editingId = null;

  async function init() {
    const token = getToken();
    if (!token) { location.href = 'login.html'; return; }
    try {
      const res = await fetch(`${API_BASE}/api/auth/verify`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        const data = await res.json();
        document.getElementById('navUser').textContent = data.username;
      } else {
        clearAuth(); location.href = 'login.html'; return;
      }
    } catch {
      clearAuth(); location.href = 'login.html'; return;
    }
    await fetchMembers();
  }

  async function fetchMembers() {
    document.getElementById('memberGrid').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API_BASE}/api/members`, {
        headers: { Authorization: `Bearer ${getToken()}` },
      });
      if (!res.ok) throw new Error();
      members = await res.json();
      renderList();
    } catch {
      document.getElementById('memberGrid').innerHTML = '<p class="empty-msg">載入失敗</p>';
    }
  }

  function renderList() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = q
      ? members.filter(m =>
          m.nameZh.toLowerCase().includes(q) ||
          m.nameEn.toLowerCase().includes(q) ||
          m.level.toLowerCase().includes(q))
      : members;

    const grid = document.getElementById('memberGrid');
    if (!filtered.length) {
      grid.innerHTML = '<p class="empty-msg">沒有符合的會員</p>';
      return;
    }
    grid.innerHTML = filtered.map(m => `
      <div class="member-card">
        <div class="mc-avatar">${m.nameZh.charAt(0)}</div>
        <div class="mc-body">
          <div class="mc-names">
            <span class="mc-name-zh">${m.nameZh}</span>
            <span class="mc-name-en">${m.nameEn}</span>
          </div>
          <span class="mc-level">${m.level}</span>
        </div>
        <div class="mc-actions">
          <button class="btn-edit-m" onclick="openModal(${m.id})">編輯</button>
          <button class="btn-del-m" onclick="deleteMember(${m.id})">刪除</button>
        </div>
      </div>`).join('');
  }

  function openModal(id = null) {
    editingId = id;
    document.getElementById('modalTitle').textContent = id ? '編輯會員' : '新增會員';
    if (id) {
      const m = members.find(m => m.id === id);
      document.getElementById('fNameZh').value = m.nameZh;
      document.getElementById('fNameEn').value = m.nameEn;
      document.getElementById('fLevel').value  = m.level;
    } else {
      document.getElementById('fNameZh').value = '';
      document.getElementById('fNameEn').value = '';
      document.getElementById('fLevel').value  = '';
    }
    document.getElementById('modal').classList.add('open');
    document.getElementById('fNameZh').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }

  async function saveMember() {
    const body = {
      name_zh: document.getElementById('fNameZh').value.trim(),
      name_en: document.getElementById('fNameEn').value.trim(),
      level:   document.getElementById('fLevel').value.trim() || 'TM',
    };
    if (!body.name_zh || !body.name_en) { alert('請填入中英文姓名'); return; }
    try {
      const url    = editingId ? `${API_BASE}/api/members/${editingId}` : `${API_BASE}/api/members`;
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error((await res.json()).detail || '儲存失敗');
      closeModal();
      await fetchMembers();
    } catch (e) {
      alert(e.message);
    }
  }

  async function deleteMember(id) {
    if (!confirm('確定要移除此會員嗎？')) return;
    try {
      const res = await fetch(`${API_BASE}/api/members/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${getToken()}` },
      });
      if (!res.ok) throw new Error();
      members = members.filter(m => m.id !== id);
      renderList();
    } catch {
      alert('刪除失敗');
    }
  }

  function doLogout() {
    if (!confirm('確定要登出嗎？')) return;
    clearAuth(); location.href = 'login.html';
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
